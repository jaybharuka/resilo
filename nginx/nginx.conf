##############################################################################
# AIOps Bot — Nginx Reverse Proxy + TLS Termination
#
# Routing:
#   /auth/*         → auth-api:5001     (FastAPI auth service)
#   /users          → auth-api:5001     (user management)
#   /ingest/*       → core-api:8000     (agent heartbeat, tight rate limit)
#   /api/*          → core-api:8000     (core REST API)
#   /*              → static React build, then core-api as fallback
#
# Rate limit zones:
#   api:        100 req/min  (general API)
#   auth:        20 req/min  (login/register — brute force protection)
#   heartbeat:   30 req/min  (per agent key — ~1 heartbeat every 2s)
##############################################################################

worker_processes auto;
error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # ── Structured access log ─────────────────────────────────────────────────
    log_format json_combined escape=json
        '{'
          '"time":"$time_iso8601",'
          '"method":"$request_method",'
          '"uri":"$request_uri",'
          '"status":$status,'
          '"bytes":$body_bytes_sent,'
          '"latency_ms":$request_time,'
          '"remote_addr":"$remote_addr",'
          '"upstream":"$upstream_addr"'
        '}';
    access_log /var/log/nginx/access.log json_combined;

    sendfile        on;
    keepalive_timeout 65;
    client_max_body_size 10m;
    client_body_timeout 12s;
    client_header_timeout 12s;
    send_timeout 10s;

    # Never expose Nginx version in headers or error pages
    server_tokens off;

    gzip on;
    gzip_types text/plain application/json application/javascript text/css;

    # ── Security headers ──────────────────────────────────────────────────────
    # always ensures headers are added even on error responses
    add_header X-Frame-Options              "DENY"                              always;
    add_header X-Content-Type-Options       "nosniff"                           always;
    add_header X-XSS-Protection             "1; mode=block"                     always;
    add_header Referrer-Policy              "strict-origin-when-cross-origin"   always;
    add_header Strict-Transport-Security    "max-age=31536000; includeSubDomains; preload" always;
    add_header Content-Security-Policy      "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; connect-src 'self' wss:; frame-ancestors 'none';" always;
    add_header Permissions-Policy           "geolocation=(), microphone=(), camera=(), payment=()" always;
    add_header Cross-Origin-Opener-Policy   "same-origin"                       always;
    add_header Cross-Origin-Resource-Policy "same-origin"                       always;

    # ── Rate limiting zones ───────────────────────────────────────────────────
    limit_req_zone  $binary_remote_addr zone=api:10m       rate=100r/m;
    limit_req_zone  $binary_remote_addr zone=auth:10m      rate=20r/m;
    limit_req_zone  $binary_remote_addr zone=login:10m     rate=5r/m;   # login only — tightest
    limit_req_zone  $binary_remote_addr zone=heartbeat:10m rate=30r/m;
    limit_req_status 429;

    # ── Connection limiting zones ─────────────────────────────────────────────
    # Prevents a single IP from holding hundreds of open connections (slow-loris)
    limit_conn_zone $binary_remote_addr zone=perip:10m;
    limit_conn_status 429;

    # ── Upstreams ─────────────────────────────────────────────────────────────
    upstream auth_service {
        server auth-api:8000;
        keepalive 32;
    }
    upstream core_service {
        server core-api:8000;
        keepalive 64;
    }

    # ── HTTP → HTTPS redirect ─────────────────────────────────────────────────
    server {
        listen 80;
        server_name _;
        return 301 https://$host$request_uri;
    }

    # ── HTTPS server ──────────────────────────────────────────────────────────
    server {
        listen 443 ssl http2;
        server_name _;

        ssl_certificate     /etc/nginx/certs/server.crt;
        ssl_certificate_key /etc/nginx/certs/server.key;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;
        ssl_session_cache   shared:SSL:10m;
        ssl_session_timeout 10m;

        # Apply connection limit to all locations on this server
        limit_conn perip 20;

        # ── Login endpoint — strictest limit (brute-force protection) ─────────
        location = /auth/login {
            limit_req  zone=login burst=3 nodelay;
            limit_conn perip 5;
            proxy_pass         http://auth_service;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_http_version 1.1;
            proxy_set_header   Connection "";
        }

        # ── Auth service ──────────────────────────────────────────────────────
        location /auth/ {
            limit_req zone=auth burst=10 nodelay;
            proxy_pass         http://auth_service;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_http_version 1.1;
            proxy_set_header   Connection "";
        }

        # ── User management (auth service) ────────────────────────────────────
        location ~ ^/users(/|$) {
            limit_req zone=api burst=20 nodelay;
            proxy_pass         http://auth_service;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_http_version 1.1;
            proxy_set_header   Connection "";
        }

        # ── Agent heartbeat — tightest rate limit ─────────────────────────────
        location /ingest/ {
            limit_req zone=heartbeat burst=5 nodelay;
            proxy_pass         http://core_service;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_http_version 1.1;
            proxy_set_header   Connection "";
        }

        # Legacy agent heartbeat (Flask protocol compat)
        location /agents/ {
            limit_req zone=heartbeat burst=5 nodelay;
            proxy_pass         http://core_service;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_http_version 1.1;
            proxy_set_header   Connection "";
        }

        # ── Core API ──────────────────────────────────────────────────────────
        location /api/ {
            limit_req zone=api burst=30 nodelay;
            proxy_pass         http://core_service;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_http_version 1.1;
            proxy_set_header   Connection "";
        }

        # ── React frontend (static files) ─────────────────────────────────────
        root /usr/share/nginx/html;
        index index.html;

        location / {
            limit_req zone=api burst=50 nodelay;
            try_files $uri $uri/ /index.html;
        }
    }
}
