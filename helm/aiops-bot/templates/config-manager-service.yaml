{{- with .Values.services.configManager }}
apiVersion: v1
kind: Service
metadata:
  name: {{ .name }}
  namespace: {{ $.Values.namespace }}
  labels:
    {{- include "aiops-bot.labels" $ | nindent 4 }}
spec:
  selector:
    {{- include "aiops-bot.selectorLabels" (dict "name" .name "root" $) | nindent 4 }}
  ports:
    - port: 80
      targetPort: {{ .port }}
      protocol: TCP
  type: ClusterIP
{{- end }}
