{{/*
Blue/Green dual-deployment for api-gateway.
Both "blue" and "green" Deployments are created simultaneously.
Traffic is routed by switching the Service selector's
app.kubernetes.io/version label between "blue" and "green".

To activate green:  helm upgrade aiops-bot . --set services.apiGateway.blueGreen.activeVersion=green
To rollback to blue: helm upgrade aiops-bot . --set services.apiGateway.blueGreen.activeVersion=blue

This achieves < 60 s rollback with zero dropped connections because both
Deployments stay running and the selector switch is atomic.
*/}}
{{- with .Values.services.apiGateway }}
{{- if .blueGreen.enabled }}

---
# Blue Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .name }}-blue
  namespace: {{ $.Values.namespace }}
  labels:
    {{- include "aiops-bot.labels" $ | nindent 4 }}
    app.kubernetes.io/name: {{ .name }}
    app.kubernetes.io/version: "blue"
    resilo.io/slot: "blue"
spec:
  replicas: {{ if eq .blueGreen.activeVersion "blue" }}{{ .replicas }}{{ else }}1{{ end }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ .name }}
      app.kubernetes.io/instance: {{ $.Release.Name }}
      app.kubernetes.io/version: "blue"
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ .name }}
        app.kubernetes.io/instance: {{ $.Release.Name }}
        app.kubernetes.io/version: "blue"
        resilo.io/slot: "blue"
    spec:
      containers:
        - name: {{ .name }}
          image: "{{ $.Values.image.registry }}/{{ .image }}:{{ .blueGreen.blueTag | default "stable" }}"
          imagePullPolicy: {{ $.Values.image.pullPolicy }}
          ports:
            - containerPort: {{ .port }}
          resources:
            {{- toYaml .resources | nindent 12 }}
          envFrom:
            - secretRef:
                name: aiops-secrets
          livenessProbe:
            httpGet:
              path: /health/live
              port: {{ .port }}
            initialDelaySeconds: 30
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health/ready
              port: {{ .port }}
            initialDelaySeconds: 20
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 2
          startupProbe:
            httpGet:
              path: /health/startup
              port: {{ .port }}
            initialDelaySeconds: 0
            periodSeconds: 5
            timeoutSeconds: 5
            failureThreshold: 60

---
# Green Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .name }}-green
  namespace: {{ $.Values.namespace }}
  labels:
    {{- include "aiops-bot.labels" $ | nindent 4 }}
    app.kubernetes.io/name: {{ .name }}
    app.kubernetes.io/version: "green"
    resilo.io/slot: "green"
spec:
  replicas: {{ if eq .blueGreen.activeVersion "green" }}{{ .replicas }}{{ else }}1{{ end }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ .name }}
      app.kubernetes.io/instance: {{ $.Release.Name }}
      app.kubernetes.io/version: "green"
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ .name }}
        app.kubernetes.io/instance: {{ $.Release.Name }}
        app.kubernetes.io/version: "green"
        resilo.io/slot: "green"
    spec:
      containers:
        - name: {{ .name }}
          image: "{{ $.Values.image.registry }}/{{ .image }}:{{ .blueGreen.greenTag | default "latest" }}"
          imagePullPolicy: {{ $.Values.image.pullPolicy }}
          ports:
            - containerPort: {{ .port }}
          resources:
            {{- toYaml .resources | nindent 12 }}
          envFrom:
            - secretRef:
                name: aiops-secrets
          livenessProbe:
            httpGet:
              path: /health/live
              port: {{ .port }}
            initialDelaySeconds: 30
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health/ready
              port: {{ .port }}
            initialDelaySeconds: 20
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 2
          startupProbe:
            httpGet:
              path: /health/startup
              port: {{ .port }}
            initialDelaySeconds: 0
            periodSeconds: 5
            timeoutSeconds: 5
            failureThreshold: 60

{{- end }}
{{- end }}
