services:
  - type: web
    name: aiops-core
    env: docker
    dockerfilePath: ./Dockerfile.core
    plan: free
    autoDeploy: true
    startCommand: sh -c "alembic upgrade head && exec uvicorn app.api.core_api:app --host 0.0.0.0 --port ${PORT:-10000}"
    envVars:
      - key: DRY_RUN
        value: "true"
      - key: NVIDIA_API_KEY
        sync: false
      - key: NVIDIA_BASE_URL
        value: https://integrate.api.nvidia.com/v1
      - key: LLM_MODEL
        value: meta/llama-3.3-70b-instruct
      - key: DATABASE_URL
        sync: false
      - key: SECRET_KEY
        sync: false
