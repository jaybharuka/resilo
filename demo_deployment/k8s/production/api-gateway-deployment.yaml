apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: api-gateway
    environment: production
    service-type: api_gateway
  name: api-gateway-deployment
  namespace: production
spec:
  replicas: 3
  selector:
    matchLabels:
      app: api-gateway
  template:
    metadata:
      labels:
        app: api-gateway
        service-type: api_gateway
    spec:
      containers:
      - env:
        - name: PORT
          value: '8080'
        - name: JWT_SECRET
          value: ${JWT_SECRET}
        - name: LOG_LEVEL
          value: INFO
        image: aiops/api-gateway:latest
        livenessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 30
          periodSeconds: 10
        name: api-gateway
        ports:
        - containerPort: 8080
        readinessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 5
        resources:
          limits:
            cpu: 500m
            memory: 512Mi
          requests:
            cpu: 500m
            memory: 512Mi
      restartPolicy: Always
