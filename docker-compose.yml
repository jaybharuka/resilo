version: '3.8'

services:

  # ── TimescaleDB — PostgreSQL + time-series extension ─────────────────────
  timescaledb:
    image: timescale/timescaledb:latest-pg16
    container_name: aiops-timescaledb
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-aiops}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-aiops}
    volumes:
      - timescaledb-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 1G
        reservations:
          cpus: "0.5"
          memory: 256M
    restart: unless-stopped
    networks:
      - aiops-network

  # ── FastAPI Auth Service (port 5001) ───────────────────────────────────────
  auth-api:
    build:
      context: .
      dockerfile: Dockerfile.auth
    ports:
      - "5001:8000"
    environment:
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER:-aiops}:${POSTGRES_PASSWORD}@timescaledb:5432/${POSTGRES_DB:-aiops}
      - JWT_SECRET_KEY=${JWT_SECRET_KEY}
      - FRONTEND_URL=${FRONTEND_URL:-http://localhost:3001}
      - EMAIL_SMTP_SERVER=${EMAIL_SMTP_SERVER:-}
      - SMTP_PORT=${SMTP_PORT:-587}
      - EMAIL_USERNAME=${EMAIL_USERNAME:-}
      - EMAIL_PASSWORD=${EMAIL_PASSWORD:-}
      - EMAIL_FROM=${EMAIL_FROM:-}
      - BACKUP_DIR=${BACKUP_DIR:-/tmp/backups}
      - DEPLOY_HOST=${DEPLOY_HOST:-http://localhost:8000}
    command: uvicorn app.api.auth_api:app --host 0.0.0.0 --port 8000 --workers 2
    depends_on:
      timescaledb:
        condition: service_healthy
    stop_grace_period: 35s
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
        reservations:
          cpus: "0.25"
          memory: 128M
    restart: unless-stopped
    networks:
      - aiops-network

  # ── FastAPI Core API (port 8000) ───────────────────────────────────────────
  core-api:
    build:
      context: .
      dockerfile: Dockerfile.core
    environment:
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER:-aiops}:${POSTGRES_PASSWORD}@timescaledb:5432/${POSTGRES_DB:-aiops}
      - JWT_SECRET_KEY=${JWT_SECRET_KEY}
      - ANOMALY_AUTONOMOUS=${ANOMALY_AUTONOMOUS:-org}
      - ANOMALY_POLL_INTERVAL=${ANOMALY_POLL_INTERVAL:-30}
      - ANOMALY_VERIFY_DELAY=${ANOMALY_VERIFY_DELAY:-60}
      - TIMESCALE_RETENTION_DAYS=${TIMESCALE_RETENTION_DAYS:-30}
      - BACKUP_DIR=${BACKUP_DIR:-/tmp/backups}
      - DEPLOY_HOST=${DEPLOY_HOST:-http://localhost:8000}
    command: uvicorn app.api.core_api:app --host 0.0.0.0 --port 8000 --workers 2
    depends_on:
      timescaledb:
        condition: service_healthy
    stop_grace_period: 35s
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
        reservations:
          cpus: "0.25"
          memory: 128M
    restart: unless-stopped
    networks:
      - aiops-network

  # ── Nginx — TLS termination + reverse proxy ────────────────────────────────
  nginx:
    build:
      context: ./nginx
      dockerfile: Dockerfile
    container_name: aiops-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./dashboard/build:/usr/share/nginx/html:ro
    depends_on:
      - auth-api
      - core-api
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
        reservations:
          cpus: "0.1"
          memory: 64M
    restart: unless-stopped
    networks:
      - aiops-network

  # Prometheus monitoring system
  prometheus:
    image: prom/prometheus:v2.45.0
    container_name: aiops-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--storage.tsdb.retention.time=200h'
      - '--web.enable-lifecycle'
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
        reservations:
          cpus: "0.25"
          memory: 128M
    restart: unless-stopped
    networks:
      - aiops-network

  # System metrics exporter
  metrics-exporter:
    build: ./metrics-exporter
    container_name: aiops-metrics-exporter
    ports:
      - "8001:8001"
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 128M
        reservations:
          cpus: "0.1"
          memory: 64M
    restart: unless-stopped
    networks:
      - aiops-network

  # Sample application with enhanced metrics
  sample-app:
    build: ./sample-app
    container_name: aiops-sample-app
    ports:
      - "5000:5000"
    environment:
      - FLASK_ENV=production
      - FLASK_APP=app.py
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
        reservations:
          cpus: "0.1"
          memory: 64M
    restart: unless-stopped
    networks:
      - aiops-network

  # AIOps Bot with ML analytics
  aiops-bot:
    build: ./bot
    container_name: aiops-bot
    ports:
      - "8080:8080"
    environment:
      - PROMETHEUS_URL=http://prometheus:9090
      - SAMPLE_APP_URL=http://sample-app:5000
      - METRICS_EXPORTER_URL=http://metrics-exporter:8001
      - DISCORD_WEBHOOK_URL=${DISCORD_WEBHOOK_URL:-}
    depends_on:
      - prometheus
      - sample-app
      - metrics-exporter
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M
        reservations:
          cpus: "0.25"
          memory: 128M
    restart: unless-stopped
    networks:
      - aiops-network

  # AlertManager — routes Prometheus alerts to Slack / Discord / Email
  alertmanager:
    image: prom/alertmanager:v0.27.0
    container_name: aiops-alertmanager
    ports:
      - "9093:9093"
    volumes:
      - ./alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml
    command:
      - '--config.file=/etc/alertmanager/alertmanager.yml'
      - '--storage.path=/alertmanager'
      - '--web.external-url=http://localhost:9093'
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 128M
        reservations:
          cpus: "0.1"
          memory: 64M
    restart: unless-stopped
    networks:
      - aiops-network

  # Grafana — visualization dashboards on top of Prometheus
  grafana:
    image: grafana/grafana:10.4.0
    container_name: aiops-grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=${GF_SECURITY_ADMIN_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GF_SECURITY_ADMIN_PASSWORD}
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_SERVER_DOMAIN=localhost
    volumes:
      - grafana-storage:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning
      - ./grafana/dashboards:/var/lib/grafana/dashboards
    depends_on:
      - prometheus
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
        reservations:
          cpus: "0.25"
          memory: 128M
    restart: unless-stopped
    networks:
      - aiops-network

  # HashiCorp Vault — secrets management
  vault:
    image: hashicorp/vault:1.16
    container_name: aiops-vault
    ports:
      - "8200:8200"
    environment:
      - VAULT_DEV_ROOT_TOKEN_ID=${VAULT_DEV_ROOT_TOKEN_ID}
      - VAULT_DEV_LISTEN_ADDRESS=0.0.0.0:8200
    cap_add:
      - IPC_LOCK
    volumes:
      - vault-storage:/vault/file
      - ./vault/config:/vault/config
    command: server -dev
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
        reservations:
          cpus: "0.1"
          memory: 64M
    restart: unless-stopped
    networks:
      - aiops-network

  # Jaeger — distributed tracing UI
  jaeger:
    image: jaegertracing/all-in-one:1.56
    container_name: aiops-jaeger
    ports:
      - "16686:16686"   # Jaeger UI
      - "14268:14268"   # HTTP collector
      - "6831:6831/udp" # UDP compact thrift
    environment:
      - COLLECTOR_OTLP_ENABLED=true
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M
        reservations:
          cpus: "0.25"
          memory: 128M
    restart: unless-stopped
    networks:
      - aiops-network

  # OpenTelemetry Collector — receives traces, forwards to Jaeger
  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.98.0
    container_name: aiops-otel-collector
    ports:
      - "4317:4317"   # OTLP gRPC
      - "4318:4318"   # OTLP HTTP
    volumes:
      - ./otel/otel-collector-config.yml:/etc/otelcol-contrib/config.yaml
    depends_on:
      - jaeger
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
        reservations:
          cpus: "0.1"
          memory: 64M
    restart: unless-stopped
    networks:
      - aiops-network

  # Elasticsearch — log storage for ELK stack
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.13.0
    container_name: aiops-elasticsearch
    ports:
      - "9200:9200"
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
    volumes:
      - elasticsearch-data:/usr/share/elasticsearch/data
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 1G
        reservations:
          cpus: "0.5"
          memory: 512M
    restart: unless-stopped
    networks:
      - aiops-network

  # Logstash — log ingestion and parsing pipeline
  logstash:
    image: docker.elastic.co/logstash/logstash:8.13.0
    container_name: aiops-logstash
    ports:
      - "5044:5044"   # Beats input
      - "5099:5001"   # TCP JSON input (host 5099 → container 5001; avoids conflict with auth-api)
    volumes:
      - ./elk/logstash/pipeline:/usr/share/logstash/pipeline
    depends_on:
      - elasticsearch
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
        reservations:
          cpus: "0.25"
          memory: 128M
    restart: unless-stopped
    networks:
      - aiops-network

  # Kibana — log visualization
  kibana:
    image: docker.elastic.co/kibana/kibana:8.13.0
    container_name: aiops-kibana
    ports:
      - "5601:5601"
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
    depends_on:
      - elasticsearch
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
        reservations:
          cpus: "0.1"
          memory: 64M
    restart: unless-stopped
    networks:
      - aiops-network

  # Filebeat — ships container logs to Logstash via Docker autodiscover
  filebeat:
    image: docker.elastic.co/beats/filebeat:8.13.0
    container_name: aiops-filebeat
    user: root
    volumes:
      - ./elk/filebeat.yml:/usr/share/filebeat/filebeat.yml:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro  # Docker Desktop exposes this on Windows too
    depends_on:
      - logstash
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 128M
        reservations:
          cpus: "0.1"
          memory: 64M
    restart: unless-stopped
    networks:
      - aiops-network

  # ── Loki — log aggregation backend ──────────────────────────────────────────
  loki:
    image: grafana/loki:2.9.0
    container_name: aiops-loki
    ports:
      - "3100:3100"
    volumes:
      - loki_data:/loki
      - ./config/loki.yml:/etc/loki/local-config.yaml:ro
    command: -config.file=/etc/loki/local-config.yaml
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:3100/ready || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
        reservations:
          cpus: "0.25"
          memory: 128M
    restart: unless-stopped
    networks:
      - aiops-network

  # ── Promtail — collects container logs and ships to Loki ─────────────────────
  promtail:
    image: grafana/promtail:2.9.0
    container_name: aiops-promtail
    volumes:
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock
      - ./config/promtail.yml:/etc/promtail/config.yml:ro
    command: -config.file=/etc/promtail/config.yml
    depends_on:
      loki:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 128M
        reservations:
          cpus: "0.1"
          memory: 64M
    restart: unless-stopped
    networks:
      - aiops-network

  # ── Scheduled database backup (daily at 2:00 AM) ──────────────────────────
  # Uses postgres:16-alpine so pg_dump is available.  BusyBox crond runs
  # backup.sh on a cron schedule inside the container.
  # Backups are written to the named 'backups' volume (./backups on host).
  backup:
    image: postgres:16-alpine
    container_name: aiops-backup
    entrypoint: >
      sh -c "
        chmod +x /scripts/backup.sh &&
        mkdir -p /etc/crontabs &&
        echo '0 2 * * * /scripts/backup.sh' > /etc/crontabs/root &&
        crond -f -l 8
      "
    environment:
      - POSTGRES_HOST=timescaledb
      - POSTGRES_PORT=5432
      - POSTGRES_DB=${POSTGRES_DB:-aiops}
      - POSTGRES_USER=${POSTGRES_USER:-aiops}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - BACKUP_DIR=/backups
      - BACKUP_RETENTION_DAYS=${BACKUP_RETENTION_DAYS:-7}
    volumes:
      - ./scripts/backup.sh:/scripts/backup.sh:ro
      - backups:/backups
    depends_on:
      timescaledb:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 128M
        reservations:
          cpus: "0.1"
          memory: 64M
    restart: unless-stopped
    networks:
      - aiops-network

networks:
  aiops-network:
    driver: bridge

volumes:
  timescaledb-data:
  grafana-storage:
  vault-storage:
  elasticsearch-data:
  backups:
  loki_data:
