# config/cloudrun.yml — GCP Cloud Run autoscaling configuration
#
# Deploy with:
#   gcloud run services replace config/cloudrun.yml --region us-central1
#
# Replace PROJECT_ID with your GCP project ID before deploying.
# This file documents the intent; actual deploy is done via deploy.yml CI.

apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: resilo-api
  namespace: default
  annotations:
    run.googleapis.com/ingress: all
spec:
  template:
    metadata:
      annotations:
        # Minimum instances — keeps at least 1 warm to avoid cold-start latency
        autoscaling.knative.dev/minScale: "1"
        # Maximum instances — caps costs and database connection pool usage
        autoscaling.knative.dev/maxScale: "10"
        # Scale up when average concurrent requests per instance exceeds this
        autoscaling.knative.dev/target: "80"
        # Use CPU-based scaling in addition to request concurrency
        run.googleapis.com/cpu-throttling: "false"
    spec:
      containerConcurrency: 80
      timeoutSeconds: 300
      serviceAccountName: aiops-cloudrun-sa
      containers:
        - image: gcr.io/PROJECT_ID/resilo-api
          ports:
            - name: http1
              containerPort: 8000
          env:
            - name: PORT
              value: "8000"
          resources:
            limits:
              cpu: "2"
              memory: 512Mi
            requests:
              cpu: "1"
              memory: 256Mi
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 30
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10

---

apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: resilo-auth
  namespace: default
  annotations:
    run.googleapis.com/ingress: all
spec:
  template:
    metadata:
      annotations:
        autoscaling.knative.dev/minScale: "1"
        autoscaling.knative.dev/maxScale: "5"
        autoscaling.knative.dev/target: "80"
        run.googleapis.com/cpu-throttling: "false"
    spec:
      containerConcurrency: 80
      timeoutSeconds: 60
      containers:
        - image: gcr.io/PROJECT_ID/resilo-auth
          ports:
            - name: http1
              containerPort: 5001
          env:
            - name: PORT
              value: "5001"
          resources:
            limits:
              cpu: "1"
              memory: 256Mi
            requests:
              cpu: "0.5"
              memory: 128Mi
          livenessProbe:
            httpGet:
              path: /health
              port: 5001
            initialDelaySeconds: 10
            periodSeconds: 30
