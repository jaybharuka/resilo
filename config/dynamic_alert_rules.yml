groups:
- interval: 30s
  name: dynamic_alerts
  rules:
  - alert: system_cpu_usage_percent_high_warning
    annotations:
      description: 'system_cpu_usage_percent value {{ $value }} exceeds warning threshold
        of 80.00 (pattern: unknown)'
      pattern_analysis: Based on 0 data points over default
      summary: system_cpu_usage_percent is above warning threshold
    expr: system_cpu_usage_percent > 80
    for: 2m
    labels:
      metric: system_cpu_usage_percent
      severity: warning
      threshold_type: dynamic
  - alert: system_cpu_usage_percent_high_critical
    annotations:
      description: 'system_cpu_usage_percent value {{ $value }} exceeds critical threshold
        of 90.00 (pattern: unknown)'
      pattern_analysis: Based on 0 data points over default
      summary: system_cpu_usage_percent is critically high
    expr: system_cpu_usage_percent > 90
    for: 2m
    labels:
      metric: system_cpu_usage_percent
      severity: critical
      threshold_type: dynamic
  - alert: system_cpu_usage_percent_low_warning
    annotations:
      description: 'system_cpu_usage_percent value {{ $value }} is below warning threshold
        of 10.00 (pattern: unknown)'
      pattern_analysis: Based on 0 data points over default
      summary: system_cpu_usage_percent is below warning threshold
    expr: system_cpu_usage_percent < 10
    for: 2m
    labels:
      metric: system_cpu_usage_percent
      severity: warning
      threshold_type: dynamic
  - alert: system_cpu_usage_percent_low_critical
    annotations:
      description: 'system_cpu_usage_percent value {{ $value }} is below critical
        threshold of 5.00 (pattern: unknown)'
      pattern_analysis: Based on 0 data points over default
      summary: system_cpu_usage_percent is critically low
    expr: system_cpu_usage_percent < 5
