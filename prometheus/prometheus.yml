global:
  scrape_interval: 5s
  evaluation_interval: 5s

rule_files:
  # - "first_rules.yml"
  # - "second_rules.yml"

scrape_configs:
  # Sample application metrics
  - job_name: 'sample-app'
    static_configs:
      - targets: ['sample-app:5000']
    scrape_interval: 5s
    metrics_path: /metrics
    
  # System metrics exporter
  - job_name: 'system-metrics'
    static_configs:
      - targets: ['metrics-exporter:8001']
    scrape_interval: 5s
    metrics_path: /metrics
    
  # Prometheus self-monitoring
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
    scrape_interval: 10s