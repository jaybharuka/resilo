      DATABASE_URL: postgresql+asyncpg://test_user:test_pass@localhost:5433/resilo_test
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt pytest==8.2.2 pytest-cov==5.0.0 pytest-asyncio==0.23.7

      - name: Run tests
        run: |
          python -m alembic upgrade head
          pytest -q

      - name: Enforce coverage threshold
        run: |
          pytest tests/ \
            --cov=app \
            --cov-report=xml:coverage.xml \
            --cov-report=term-missing \
            --cov-fail-under=60 \
            -q

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: coverage.xml
          retention-days: 14

