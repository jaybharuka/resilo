name: CI - Lint, Test, Build

# Runs on every push to every branch and on every pull request targeting main.
# This is the gate that must pass before code can be merged.
# Deployment is handled separately by deploy.yml (main branch only).

on:
  push:
    branches: ['**']
  pull_request:
    branches: [main]

jobs:
  # Stage 1: Lint
  lint:
    name: Lint (flake8 + black)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install linters
        run: pip install flake8 black

      - name: flake8
        run: flake8 scripts/tenant_smoke.py --max-line-length=100

      - name: black --check
        run: black --check scripts/tenant_smoke.py --line-length=100

  # Stage 2: Test
  # Blocks build and deploy if any test fails or coverage drops below 40%.
  test:
    name: Test (pytest + coverage)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: test_auth
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql+asyncpg://test:test@localhost:5432/test_auth
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        run: pytest -q

      - name: Enforce coverage threshold
        run: |
          pytest tests/ \
            --cov=app \
            --cov-report=xml:coverage.xml \
            --cov-report=term-missing \
            --cov-fail-under=60 \
            -q

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: coverage.xml
          retention-days: 14

  # Stage 3: Build
  # Validates both Dockerfiles build cleanly. Images are not pushed here.
  # Pushing happens in deploy.yml on merge to main.
  build:
    name: Build Docker images
    runs-on: ubuntu-latest
    needs: [test]
    steps:
      - uses: actions/checkout@v4

      - name: Build core-api image
        run: |
          docker build \
            -t core-api:${{ github.sha }} \
            -f Dockerfile.core \
            .

      - name: Build auth-api image
        run: |
          docker build \
            -t auth-api:${{ github.sha }} \
            -f Dockerfile.auth \
            .
