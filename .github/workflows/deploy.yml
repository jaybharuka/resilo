name: Deploy — Firebase + Cloud Run

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  GCP_PROJECT: resilo-ai
  GCP_REGION:  us-central1

jobs:

  # ── 0. Security Scan ───────────────────────────────────────────────────────
  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install bandit
        run: pip install bandit==1.7.9

      - name: Run bandit security scan
        run: bandit -r app/ -f json -o /tmp/bandit-report.json || true

      - name: Check for critical issues
        run: |
          if grep -q '"issue_severity": "HIGH"' /tmp/bandit-report.json; then
            echo "⚠️  High severity security issues found"
            cat /tmp/bandit-report.json
            exit 1
          fi

  # ── 0.5. Linting ───────────────────────────────────────────────────────────
  lint:
    name: Lint Python Code
    runs-on: ubuntu-latest
    needs: security-scan
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install flake8
        run: pip install flake8==7.0.0

      - name: Run flake8 linting
        run: flake8 app/ --count --select=E9,F63,F7,F82 --show-source --statistics

  # ── 0.75. Tests + Coverage Gate ──────────────────────────────────────────
  test:
    name: Test (pytest + coverage)
    runs-on: ubuntu-latest
    needs: [security-scan, lint]
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_pass
          POSTGRES_DB: resilo_test
        ports:
          - 5433:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql+asyncpg://test_user:test_pass@localhost:5433/resilo_test
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt pytest==8.2.2 pytest-cov==5.0.0 pytest-asyncio==0.23.7

      - name: Run tests with coverage gate
        run: |
          pytest tests/ \
            --cov=app \
            --cov-report=term-missing \
            --cov-fail-under=60 \
            -q

  # ── 0.9. Schema Migration Gate ───────────────────────────────────────────
  migrate-schema:
    name: Run Alembic Migration
    runs-on: ubuntu-latest
    needs: [test]
    env:
      DATABASE_URL: ${{ secrets['DATABASE_URL'] }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Enforce alembic upgrade head
        run: |
          if [ -z "$DATABASE_URL" ]; then
            echo "DATABASE_URL secret is required for deployment migrations"
            exit 1
          fi
          python -m alembic upgrade head

  # ── 1. Staging Frontend → Firebase Hosting ────────────────────────────────
  deploy-frontend-staging:
    name: Staging Frontend → Firebase
    runs-on: ubuntu-latest
    needs: [security-scan, lint, test, migrate-schema]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: dashboard/package-lock.json

      - name: Install
        run: npm ci
        working-directory: dashboard

      - name: Build
        run: npm run build
        working-directory: dashboard
        env:
          CI: false
          REACT_APP_API_BASE_URL: https://staging-resilo-ai.web.app
          REACT_APP_AUTH_API_URL: https://staging-resilo-ai.web.app
          REACT_APP_CORE_API_URL: https://staging-resilo-ai.web.app
          REACT_APP_SOCKET_URL:   https://staging-resilo-ai.web.app
          REACT_APP_USE_MOCKS:    false
          REACT_APP_DIRECT_MODE:  false

      - name: Deploy to Firebase Hosting (Staging)
        env:
          FIREBASE_SA_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: |
          printf '%s' "$FIREBASE_SA_JSON" > /tmp/firebase-sa.json
          export GOOGLE_APPLICATION_CREDENTIALS=/tmp/firebase-sa.json
          npm install -g firebase-tools@latest --quiet
          firebase deploy --only hosting --project resilo-ai-staging --non-interactive
          rm -f /tmp/firebase-sa.json

  # ── 2. Production Frontend → Firebase Hosting (requires approval) ─────────
  deploy-frontend-production:
    name: Production Frontend → Firebase
    runs-on: ubuntu-latest
    needs: [security-scan, lint, test, migrate-schema]
    environment:
      name: production
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: dashboard/package-lock.json

      - name: Install
        run: npm ci
        working-directory: dashboard

      - name: Build
        run: npm run build
        working-directory: dashboard
        env:
          CI: false
          REACT_APP_API_BASE_URL: https://resilo-ai.web.app
          REACT_APP_AUTH_API_URL: https://resilo-ai.web.app
          REACT_APP_CORE_API_URL: https://resilo-ai.web.app
          REACT_APP_SOCKET_URL:   https://resilo-ai.web.app
          REACT_APP_USE_MOCKS:    false
          REACT_APP_DIRECT_MODE:  false

      - name: Deploy to Firebase Hosting (Production)
        env:
          FIREBASE_SA_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: |
          printf '%s' "$FIREBASE_SA_JSON" > /tmp/firebase-sa.json
          export GOOGLE_APPLICATION_CREDENTIALS=/tmp/firebase-sa.json
          npm install -g firebase-tools@latest --quiet
          firebase deploy --only hosting --project resilo-ai --non-interactive
          rm -f /tmp/firebase-sa.json

  # ── 3. Staging Core API → Cloud Run ──────────────────────────────────────
  deploy-core-api-staging:
    name: Staging Core API → Cloud Run
    runs-on: ubuntu-latest
    needs: [security-scan, lint, test, migrate-schema]
    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        run: |
          echo '${{ secrets.GCP_SA_KEY }}' > /tmp/sa-key.json
          gcloud auth activate-service-account --key-file=/tmp/sa-key.json --quiet
          gcloud config set project ${{ env.GCP_PROJECT }}-staging
          gcloud auth configure-docker gcr.io --quiet
          rm /tmp/sa-key.json

      - name: Build & Push image
        run: |
          IMAGE=gcr.io/${{ env.GCP_PROJECT }}-staging/core-api
          docker build -t $IMAGE:${{ github.sha }} -t $IMAGE:latest -f Dockerfile.core .
          docker push $IMAGE:${{ github.sha }}
          docker push $IMAGE:latest

      - name: Deploy to Cloud Run (Staging)
        run: |
          gcloud run deploy core-api-staging \
            --image gcr.io/${{ env.GCP_PROJECT }}-staging/core-api:${{ github.sha }} \
            --region ${{ env.GCP_REGION }} \
            --platform managed \
            --quiet

      - name: Health Check (Staging)
        run: |
          HEALTH_URL=$(gcloud run services describe core-api-staging --region ${{ env.GCP_REGION }} --format='value(status.url)')/api/health
          for i in {1..30}; do
            HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" "$HEALTH_URL")
            if [ "$HTTP_CODE" = "200" ]; then
              echo "✅ Health check passed (HTTP $HTTP_CODE)"
              exit 0
            fi
            echo "Attempt $i: HTTP $HTTP_CODE, retrying..."
            sleep 2
          done
          echo "❌ Health check failed after 30 attempts"
          exit 1

  # ── 4. Production Core API → Cloud Run (requires approval) ───────────────
  deploy-core-api-production:
    name: Production Core API → Cloud Run
    runs-on: ubuntu-latest
    needs: [security-scan, lint, test, migrate-schema]
    environment:
      name: production
    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        run: |
          echo '${{ secrets.GCP_SA_KEY }}' > /tmp/sa-key.json
          gcloud auth activate-service-account --key-file=/tmp/sa-key.json --quiet
          gcloud config set project ${{ env.GCP_PROJECT }}
          gcloud auth configure-docker gcr.io --quiet
          rm /tmp/sa-key.json

      - name: Build & Push image
        run: |
          IMAGE=gcr.io/${{ env.GCP_PROJECT }}/core-api
          docker build -t $IMAGE:${{ github.sha }} -t $IMAGE:latest -f Dockerfile.core .
          docker push $IMAGE:${{ github.sha }}
          docker push $IMAGE:latest

      - name: Deploy to Cloud Run (Production)
        run: |
          gcloud run deploy core-api \
            --image gcr.io/${{ env.GCP_PROJECT }}/core-api:${{ github.sha }} \
            --region ${{ env.GCP_REGION }} \
            --platform managed \
            --quiet

      - name: Health Check (Production)
        run: |
          HEALTH_URL=$(gcloud run services describe core-api --region ${{ env.GCP_REGION }} --format='value(status.url)')/api/health
          for i in {1..30}; do
            HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" "$HEALTH_URL")
            if [ "$HTTP_CODE" = "200" ]; then
              echo "✅ Health check passed (HTTP $HTTP_CODE)"
              exit 0
            fi
            echo "Attempt $i: HTTP $HTTP_CODE, retrying..."
            sleep 2
          done
          echo "❌ Health check failed after 30 attempts"
          exit 1

  # ── 5. Staging Auth API → Cloud Run ──────────────────────────────────────
  deploy-auth-api-staging:
    name: Staging Auth API → Cloud Run
    runs-on: ubuntu-latest
    needs: [security-scan, lint, test, migrate-schema]
    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        run: |
          echo '${{ secrets.GCP_SA_KEY }}' > /tmp/sa-key.json
          gcloud auth activate-service-account --key-file=/tmp/sa-key.json --quiet
          gcloud config set project ${{ env.GCP_PROJECT }}-staging
          gcloud auth configure-docker gcr.io --quiet
          rm /tmp/sa-key.json

      - name: Build & Push image
        run: |
          IMAGE=gcr.io/${{ env.GCP_PROJECT }}-staging/auth-api
          docker build -t $IMAGE:${{ github.sha }} -t $IMAGE:latest -f Dockerfile.auth .
          docker push $IMAGE:${{ github.sha }}
          docker push $IMAGE:latest

      - name: Deploy to Cloud Run (Staging)
        run: |
          gcloud run deploy auth-api-staging \
            --image gcr.io/${{ env.GCP_PROJECT }}-staging/auth-api:${{ github.sha }} \
            --region ${{ env.GCP_REGION }} \
            --platform managed \
            --quiet

      - name: Health Check (Staging)
        run: |
          HEALTH_URL=$(gcloud run services describe auth-api-staging --region ${{ env.GCP_REGION }} --format='value(status.url)')/auth/health
          for i in {1..30}; do
            HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" "$HEALTH_URL")
            if [ "$HTTP_CODE" = "200" ]; then
              echo "✅ Health check passed (HTTP $HTTP_CODE)"
              exit 0
            fi
            echo "Attempt $i: HTTP $HTTP_CODE, retrying..."
            sleep 2
          done
          echo "❌ Health check failed after 30 attempts"
          exit 1

  # ── 6. Production Auth API → Cloud Run (requires approval) ───────────────
  deploy-auth-api-production:
    name: Production Auth API → Cloud Run
    runs-on: ubuntu-latest
    needs: [security-scan, lint, test, migrate-schema]
    environment:
      name: production
    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        run: |
          echo '${{ secrets.GCP_SA_KEY }}' > /tmp/sa-key.json
          gcloud auth activate-service-account --key-file=/tmp/sa-key.json --quiet
          gcloud config set project ${{ env.GCP_PROJECT }}
          gcloud auth configure-docker gcr.io --quiet
          rm /tmp/sa-key.json

      - name: Build & Push image
        run: |
          IMAGE=gcr.io/${{ env.GCP_PROJECT }}/auth-api
          docker build -t $IMAGE:${{ github.sha }} -t $IMAGE:latest -f Dockerfile.auth .
          docker push $IMAGE:${{ github.sha }}
          docker push $IMAGE:latest

      - name: Deploy to Cloud Run (Production)
        run: |
          gcloud run deploy auth-api \
            --image gcr.io/${{ env.GCP_PROJECT }}/auth-api:${{ github.sha }} \
