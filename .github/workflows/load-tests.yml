name: Load Tests (manual)

# ── Manual trigger ONLY — never runs on push or PR ───────────────────────────
# Run from: GitHub Actions → "Load Tests (manual)" → "Run workflow"
on:
  workflow_dispatch:
    inputs:
      duration:
        description: 'Seconds per scenario (default: 60)'
        required: false
        default: '60'
      load_test_email:
        description: 'Load test user email (optional; falls back to secret)'
        required: false
        default: ''
      auth_api_host:
        description: 'Auth API base URL'
        required: false
        default: 'http://localhost:5001'
      core_api_host:
        description: 'Core API base URL'
        required: false
        default: 'http://localhost:8000'

jobs:
  load-test:
    name: Locust Load Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Verify locustfile parses
        run: locust -f tests/load/locustfile.py --list

      - name: Make run script executable
        run: chmod +x tests/load/run_load_tests.sh

      - name: Validate required secrets
        env:
          AGENT_KEY: ${{ secrets.LOAD_TEST_AGENT_KEY }}
          ORG_ID: ${{ secrets.LOAD_TEST_ORG_ID }}
          LOAD_TEST_PASSWORD: ${{ secrets.LOAD_TEST_PASSWORD }}
        run: |
          set -euo pipefail
          missing=0
          for key in AGENT_KEY ORG_ID LOAD_TEST_PASSWORD; do
            if [ -z "${!key}" ]; then
              echo "ERROR: Required secret is missing: $key"
              missing=1
            fi
          done
          if [ "$missing" -ne 0 ]; then
            echo "Set repository secrets: LOAD_TEST_AGENT_KEY, LOAD_TEST_ORG_ID, LOAD_TEST_PASSWORD"
            exit 1
          fi

      - name: Run load tests
        env:
          AUTH_API_HOST: ${{ github.event.inputs.auth_api_host }}
          CORE_API_HOST: ${{ github.event.inputs.core_api_host }}
          DURATION:      ${{ github.event.inputs.duration }}
          AGENT_KEY:     ${{ secrets.LOAD_TEST_AGENT_KEY }}
          ORG_ID:        ${{ secrets.LOAD_TEST_ORG_ID }}
          LOAD_TEST_EMAIL:    ${{ github.event.inputs.load_test_email || secrets.LOAD_TEST_EMAIL }}
          LOAD_TEST_PASSWORD: ${{ secrets.LOAD_TEST_PASSWORD }}
        run: bash tests/load/run_load_tests.sh

      - name: Upload results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: load-test-results
          path: tests/load/results/
          retention-days: 30
