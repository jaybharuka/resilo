name: Build ResilioAgent.exe

on:
  push:
    branches: [main]
    paths:
      - 'desktop_agent/**'
      - '.github/workflows/build-agent.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build deps
        run: pip install pyinstaller pystray pillow psutil

      - name: Build EXE
        working-directory: desktop_agent
        run: |
          pyinstaller `
            --onefile `
            --windowed `
            --name ResilioAgent `
            resilo_gui.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ResilioAgent-windows
          path: desktop_agent/dist/ResilioAgent.exe
          retention-days: 30

  release:
    needs: build-windows
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: ResilioAgent-windows
          path: dist/

      - name: Create/update rolling release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: agent-latest
          name: "Resilo Agent (latest)"
          make_latest: true
          body: |
            ## ResilioAgent.exe

            **Download ResilioAgent.exe**, run it, paste your token from the dashboard, click Connect.

            - No Python needed on the remote machine
            - Metrics appear within seconds
            - Click "Install Service" to survive reboots
          files: dist/ResilioAgent.exe
          prerelease: false
          token: ${{ secrets.GITHUB_TOKEN }}
