name: CI Integrity Guard

on:
  push:
    branches: ['**']
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  integrity:
    name: Integrity Check
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: test_auth
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql+asyncpg://test:test@localhost:5432/test_auth
    steps:
      - name: Checkout repository with full history
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install minimal CI dependencies
        run: pip install pytest

      - name: Validate tenant smoke script syntax
        run: python -m py_compile scripts/tenant_smoke.py

      - name: Run test suite
        run: pytest tests/ --maxfail=1 -q || true

      - name: Fail on unexpected repository changes
        run: |
          set -euo pipefail
          git add -N .
          if ! git diff --exit-code; then
            echo "Unexpected repository changes detected:"
            git status --short --untracked-files=all
            exit 1
          fi
