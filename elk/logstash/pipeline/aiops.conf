input {
  # Receives logs from Filebeat
  beats {
    port => 5044
  }

  # Receives JSON logs directly over TCP (from api_server.py)
  tcp {
    port => 5001
    codec => json_lines
  }
}

filter {
  # Parse JSON log lines from api_server.py
  if [message] {
    json {
      source => "message"
      skip_on_invalid_json => true
    }
  }

  # Normalize timestamp
  if [timestamp] {
    date {
      match => ["timestamp", "ISO8601"]
      target => "@timestamp"
    }
  }

  # Tag by log level severity
  if [level] == "ERROR" or [level] == "CRITICAL" {
    mutate { add_tag => ["alert"] }
  }

  # Add service name if missing
  if ![service] {
    mutate { add_field => { "service" => "aiops-bot" } }
  }
}

output {
  elasticsearch {
    hosts => ["elasticsearch:9200"]
    index => "aiops-logs-%{+YYYY.MM.dd}"
  }

  # Echo errors to stdout for debugging
  if "alert" in [tags] {
    stdout {
      codec => rubydebug
    }
  }
}
