global:
  scrape_interval: 15s
  evaluation_interval: 15s

alerting:
  alertmanagers:
    - static_configs:
        - targets: ['alertmanager:9093']

rule_files:
  - '/etc/prometheus/alert_rules.yml'

scrape_configs:
  # Prometheus self-monitoring
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # AIOps custom metrics exporter (port 8001)
  - job_name: 'metrics-exporter'
    static_configs:
      - targets: ['metrics-exporter:8001']
    metrics_path: /metrics

  # Main AIOps Flask API (port 5000)
  - job_name: 'aiops-api'
    static_configs:
      - targets: ['sample-app:5000']
    metrics_path: /metrics

  # OpenTelemetry Collector Prometheus exporter (port 8889)
  - job_name: 'otel-collector'
    static_configs:
      - targets: ['otel-collector:8889']
    metrics_path: /metrics

  # Grafana self-monitoring
  - job_name: 'grafana'
    static_configs:
      - targets: ['grafana:3000']
    metrics_path: /metrics
